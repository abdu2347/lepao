<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 乐跑数据生成器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        .register-card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 2.5rem;
            max-width: 420px;
            width: 90%;
            backdrop-filter: blur(10px);
        }
        .register-card h1 {
            color: #1e3c72;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .register-card .subtitle {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-control:focus {
            border-color: #2ecc71;
            box-shadow: 0 0 0 0.2rem rgba(46,204,113,0.25);
        }
        .btn-register {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46,204,113,0.4);
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #7f8c8d;
        }
        .login-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .alert {
            border-radius: 10px;
            display: none;
        }
        .alert.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-card">
        <h1>注册账号</h1>
        <p class="subtitle">使用QQ号注册跑步数据生成器</p>
        <div class="alert alert-success" id="successMsg" role="alert"></div>
        <div class="alert alert-danger" id="errorMsg" role="alert"></div>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">QQ号</label>
                <input type="text" class="form-control" id="username" placeholder="请输入QQ号" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" id="password" placeholder="至少4个字符，自定义密码" required>
            </div>
            <div class="mb-3">
                <label class="form-label">确认密码</label>
                <input type="password" class="form-control" id="password2" placeholder="再次输入密码" required>
            </div>
            <button type="submit" class="btn-register">注 册</button>
        </form>
        <div class="login-link">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            
            const errEl = document.getElementById('errorMsg');
            const sucEl = document.getElementById('successMsg');
            errEl.classList.remove('show');
            sucEl.classList.remove('show');
            
            const p1 = document.getElementById('password').value;
            const p2 = document.getElementById('password2').value;
            const qq = document.getElementById('username').value.trim();
            
            if (!qq || !/^\\d+$/.test(qq)) {
                errEl.textContent = '请输入正确的QQ号（纯数字）';
                errEl.classList.add('show');
                return;
            }
            if (p1 !== p2) {
                errEl.textContent = '两次密码输入不一致';
                errEl.classList.add('show');
                return;
            }
            if (p1.length < 4) {
                errEl.textContent = '密码至少4个字符';
                errEl.classList.add('show');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: qq, password: p1})
                });
                const data = await res.json();
                if (data.success) {
                    sucEl.textContent = '注册成功！即将跳转到登录页...';
                    sucEl.classList.add('show');
                    btn.textContent = '注册成功 ✓';
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    errEl.textContent = data.message;
                    errEl.classList.add('show');
                    btn.disabled = false;
                    btn.textContent = '注 册';
                }
            } catch(e) {
                errEl.textContent = '网络错误，请重试';
                errEl.classList.add('show');
                btn.disabled = false;
                btn.textContent = '注 册';
            }
        });
    </script>
</body>
</html>
